version: '3.8'

services:
  agent:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AGENT_API_KEY=my-secret-key
    depends_on:
      - redis
    # Do not expose ports here, let nginx handle it

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent
